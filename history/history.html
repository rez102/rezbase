<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://ddieubjzcwfrwsleyrkk.supabase.co wss://ddieubjzcwfrwsleyrkk.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>更新履歴</title>
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="../equipment/equipment.css">
    <link rel="stylesheet" href="history.css">
</head>

<body data-site-root-prefix=".." data-site-active-page="history">
    <div class="layout">
        <div data-site-shell="sidebar"></div>
        <main class="main">
            <button id="main-sidebar-open" class="main-sidebar-toggle" title="メニューを開く">≡</button>
            <button id="main-sidebar-close" class="main-sidebar-close" title="メニューを閉じる">‹</button>
            <div class="history-container">
                <section class="history-hero">
                    <p class="history-eyebrow">Site Update</p>
                    <h1>更新履歴</h1>
                    <p class="history-subtitle">Maneater Wiki の機能追加・改善をまとめています。</p>
                    <div class="history-summary">
                        <div class="history-summary-card">
                            <span class="history-summary-value" id="history-total-count">0</span>
                            <span class="history-summary-label">更新件数</span>
                        </div>
                        <div class="history-summary-card">
                            <span class="history-summary-value" id="history-last-date">-</span>
                            <span class="history-summary-label">最新更新日</span>
                        </div>
                    </div>
                </section>
                <div id="history-list" class="history-timeline"></div>
                <div data-site-shell="footer"></div>
            </div>
        </main>
    </div>
    <script src="../shared/site-shell.js"></script>
    <script src="history.js" defer></script>
</body>

</html>
