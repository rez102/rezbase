<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://ddieubjzcwfrwsleyrkk.supabase.co wss://ddieubjzcwfrwsleyrkk.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>悪名ランクハンター詳細</title>
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="../equipment/equipment.css">
    <link rel="stylesheet" href="hunters.css">
</head>

<body data-site-root-prefix=".." data-site-active-page="hunters">
    <div class="layout">
        <div data-site-shell="sidebar"></div>
        <main class="main">
            <button id="main-sidebar-open" class="main-sidebar-toggle" title="メニューを開く">≡</button>
            <button id="main-sidebar-close" class="main-sidebar-close" title="メニューを閉じる">‹</button>

            <div class="hunter-detail-page">
                <section class="hunter-detail-hero">
                    <div class="hunter-emblem-wrap">
                        <div id="hunter-emblem" class="hunter-emblem" aria-hidden="true"></div>
                    </div>
                    <div class="hunter-detail-copy">
                        <p id="hunter-rank-label" class="hunter-rank-label"></p>
                        <h1 id="hunter-name"></h1>
                        <p id="hunter-role" class="hunter-role"></p>
                        <p id="hunter-loadout" class="hunter-loadout-inline"></p>
                        <p id="hunter-summary" class="hunter-summary"></p>
                    </div>
                </section>

                <section class="hunter-meta-panel">
                    <div class="hunter-meta-card">
                        <span class="hunter-meta-label">報酬</span>
                        <div id="hunter-reward" class="hunter-reward-list"></div>
                    </div>
                </section>

                <section class="hunter-sections">
                    <article class="hunter-section-card">
                        <h2>説明</h2>
                        <p id="hunter-overview"></p>
                    </article>
                </section>

                <div data-site-shell="footer"></div>
            </div>
        </main>
    </div>

    <script src="../shared/site-shell.js"></script>
    <script src="hunters-data.js"></script>
    <script src="hunter-detail.js"></script>
    <script src="hunter-layout.js"></script>
</body>

</html>
