<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maneater Map Debug Tool (DLC)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #05040a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #05040a;
        }

        .debug-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 15, 30, 0.95);
            border: 1px solid #ffd37a;
            padding: 15px;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 211, 122, 0.2);
            min-width: 280px;
            backdrop-filter: blur(5px);
        }

        .debug-overlay h2 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #ffd37a;
            border-bottom: 1px solid rgba(255, 211, 122, 0.3);
            padding-bottom: 5px;
        }

        .coords-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .coords-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .coords-item span:first-child {
            color: #aaa;
        }

        .coords-item span:last-child {
            color: #fff;
        }

        .copy-code {
            background: #1a1e2a;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            word-break: break-all;
            transition: all 0.2s;
            border: 1px solid #3a3f4e;
            color: #00ffff;
        }

        .copy-code:hover {
            background: #2a2e3a;
            border-color: #00ffff;
        }

        .copy-code:active {
            transform: scale(0.98);
        }

        .help-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }

        .copy-banner {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ffff;
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="debug-overlay">
        <h2>Map Debug Tool (DLC)</h2>
        <div class="coords-box">
            <div class="coords-item">
                <span>Lat:</span>
                <span id="lat-val">-</span>
            </div>
            <div class="coords-item">
                <span>Lng:</span>
                <span id="lng-val">-</span>
            </div>
        </div>
        
        <div style="margin-bottom: 5px; font-size: 0.85rem; color: #ffd37a;">JS形式でコピー:</div>
        <div id="copy-obj" class="copy-code">{ lat: -, lng: - }</div>

        <div style="margin-top: 15px; margin-bottom: 5px; font-size: 0.85rem; color: #ffd37a;">SS形式でコピー (タブ区切り):</div>
        <div id="copy-tsv" class="copy-code">- [TAB] -</div>

        <div style="margin-top: 15px; margin-bottom: 5px; font-size: 0.85rem; color: #ffd37a;">CSV形式でコピー (カンマ区切り):</div>
        <div id="copy-csv" class="copy-code">-, -</div>
        
        <div class="help-text">
            ※マップをクリックすると反映されます
        </div>
    </div>

    <div id="copy-banner" class="copy-banner">コピーしました！</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 設定値 (本番の map.js と合わせる)
        const w = 1120;
        const h = 1120;
        const bounds = [[0, 0], [h, w]];

        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom: 3,
            zoomControl: false
        });

        // ズームコントロール
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 背景画像（DLC）
        L.imageOverlay('../images/dlc_maneater_map.png', bounds).addTo(map);
        map.fitBounds(bounds);

        // 要素キャッシュ
        const latVal = document.getElementById('lat-val');
        const lngVal = document.getElementById('lng-val');
        const copyCode = document.getElementById('copy-obj');
        const copyTsv = document.getElementById('copy-tsv');
        const copyCsv = document.getElementById('copy-csv');
        const banner = document.getElementById('copy-banner');

        // 座標データを保持する変数
        let currentLat = null;
        let currentLng = null;

        // クリックイベント
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(2);
            const lng = e.latlng.lng.toFixed(2);
            currentLat = lat;
            currentLng = lng;

            latVal.innerText = lat;
            lngVal.innerText = lng;

            copyCode.innerText = `{ lat: ${lat}, lng: ${lng} }`;
            copyTsv.innerText = `${lat} [TAB] ${lng}`;
            copyCsv.innerText = `${lat}, ${lng}`;
        });

        // コピー機能 (JS)
        copyCode.onclick = function() {
            if (!currentLat) return;
            copyToClipboard(`{ lat: ${currentLat}, lng: ${currentLng} }`);
        };

        // コピー機能 (TSV - スプレッドシート用タブ区切り)
        copyTsv.onclick = function() {
            if (!currentLat) return;
            copyToClipboard(`${currentLat}\t${currentLng}`);
        };

        // コピー機能 (CSV - カンマ区切り)
        copyCsv.onclick = function() {
            if (!currentLat) return;
            copyToClipboard(`${currentLat},${currentLng}`);
        };

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                banner.innerText = 'コピーしました！';
                banner.style.display = 'block';
                setTimeout(() => {
                    banner.style.display = 'none';
                }, 1000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
