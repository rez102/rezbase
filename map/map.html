<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maneater マップ</title>
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="map.css">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <a href="../index.html" class="logo">
                <span>Maneater Wiki</span>
            </a>
            <nav class="menu">
                <a href="../maneater.html" class="menu-item">
                    <img src="../images/進化1.png" alt="装備">
                    <span>装備</span>
                </a>
                <a href="map.html" class="menu-item active">
                    <img src="../images/map1.png" alt="マップ">
                    <span>マップ</span>
                </a>
                <a href="../history/history.html" class="menu-item">
                    <span>更新履歴</span>
                </a>
            </nav>
        </aside>
        <main class="main">
            <div class="map-container">
                <!-- 左サイドバー（マップ内オーバーレイ） -->
                <aside class="map-sidebar" id="map-sidebar">
                    <!-- エリアヘッダー（原神風） -->
                    <div class="sidebar-header" id="area-header-btn">
                        <div class="current-area-info">
                            <span class="area-label">現在のエリア</span>
                            <h2 id="current-area-name">全エリアを表示</h2>
                            <div class="progress-bar-mini">
                                <div class="progress-fill" id="area-progress-fill" style="width: 0%"></div>
                            </div>
                            <span class="progress-text">探索度 : <span id="area-progress-percent">0</span>%</span>
                        </div>
                        <button class="area-switch-btn">⇄ 切り替える</button>
                    </div>

                    <!-- エリア選択オーバーレイ -->
                    <div class="area-selection-overlay hidden" id="area-overlay">
                        <div class="overlay-header">
                            <h3>エリアを選択</h3>
                            <button id="close-area-overlay" class="close-btn">×</button>
                        </div>
                        <div class="area-list" id="area-filters">
                            <button class="area-card" data-area="all">
                                <div class="area-card-content">
                                    <strong>全エリア</strong>
                                    <span>すべてのピンを表示</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="フォーティック・バイユー">
                                <div class="area-card-content">
                                    <strong>フォーティック・バイユー</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="デッド・ホース・レイク">
                                <div class="area-card-content">
                                    <strong>デッド・ホース・レイク</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="ゴールデン・ショア">
                                <div class="area-card-content">
                                    <strong>ゴールデン・ショア</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="サファリア・ベイ">
                                <div class="area-card-content">
                                    <strong>サファリア・ベイ</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="プロスピリティー・サンド">
                                <div class="area-card-content">
                                    <strong>プロスピリティー・サンド</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="キャビアキー">
                                <div class="area-card-content">
                                    <strong>キャビアキー</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="湾岸">
                                <div class="area-card-content">
                                    <strong>湾岸</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                            <button class="area-card" data-area="クローフィッシュ・ベイ">
                                <div class="area-card-content">
                                    <strong>クローフィッシュ・ベイ</strong>
                                    <span class="area-sub">探索度: 0%</span>
                                </div>
                            </button>
                        </div>
                    </div>

                    <div class="sidebar-content">
                        <div class="sidebar-section">
                            <h3>収集物</h3>
                            <div class="pin-grid">
                                <button class="filter-type-btn active" data-type="landmark">
                                    <div class="icon-wrap"><img src="../images/map/ランドマーク.png" alt=""><span class="pin-count">0</span></div>
                                    <span>ランドマーク</span>
                                </button>
                                <button class="filter-type-btn active" data-type="nutrient">
                                    <div class="icon-wrap"><img src="../images/map/栄養箱.png" alt=""><span class="pin-count">0</span></div>
                                    <span>栄養箱</span>
                                </button>
                                <button class="filter-type-btn active" data-type="plate">
                                    <div class="icon-wrap"><img src="../images/map/ナンバープレート.png" alt=""><span class="pin-count">0</span></div>
                                    <span>ナンバー</span>
                                </button>
                            </div>
                        </div>

                        <div class="sidebar-section">
                            <h3>クエスト</h3>
                            <div class="pin-grid">
                                <button class="filter-type-btn active" data-type="main-quest">
                                    <div class="icon-wrap"><img src="../images/map/メインクエスト.png" alt=""><span class="pin-count">0</span></div>
                                    <span>メイン</span>
                                </button>
                                <button class="filter-type-btn active" data-type="sub-quest">
                                    <div class="icon-wrap"><img src="../images/map/手配.png" alt=""><span class="pin-count">0</span></div>
                                    <span>狩猟クエスト</span>
                                </button>
                                <button class="filter-type-btn active" data-type="manhunt">
                                    <div class="icon-wrap"><img src="../images/map/人間狩り.png" alt=""><span class="pin-count">0</span></div>
                                    <span>復讐クエスト</span>
                                </button>
                            </div>
                        </div>

                        <div class="sidebar-section">
                            <h3>その他</h3>
                            <div class="pin-grid">
                                <button class="filter-type-btn active" data-type="grate">
                                    <div class="icon-wrap"><img src="../images/map/鉄格子.png" alt=""><span class="pin-count">0</span></div>
                                    <span>鉄格子</span>
                                </button>
                                <button class="filter-type-btn active" data-type="floodgate">
                                    <div class="icon-wrap"><img src="../images/map/水門.png" alt=""><span class="pin-count">0</span></div>
                                    <span>水門</span>
                                </button>
                            </div>
                        </div>

                        <div class="sidebar-section">
                            <h3>設定</h3>
                            <button id="reset-filters-btn" class="filter-reset-btn" style="margin-bottom: 8px;">全てのピンを表示</button>
                            <button id="reset-all-pins-btn" class="filter-reset-btn warning">ピンを全て未取得に戻す</button>
                        </div>
                    </div>
                </aside>

                <!-- 右上アクション -->
                <div class="map-actions">
                    <div class="action-wrap-popover">
                        <button id="toggle-settings-btn" class="action-btn" title="表示・非表示設定">
                            <span class="icon">👁️</span>
                        </button>
                        <div id="settings-popover" class="action-popover hidden">
                            <div class="popover-section">
                                <span class="popover-title">取得済みピンの表示</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="show-obtained-check" checked>
                                    <span class="switch-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <button id="route-mode-btn" class="action-btn" title="ルート作成モード">
                        <span class="icon">🛣️</span>
                    </button>
                </div>

                <!-- ルートパネル（右サイドバー/オーバーレイ） -->
                <div class="route-panel" id="route-panel">
                    <h3>マイルート</h3>
                    <div class="route-create-box">
                        <input type="text" id="route-name-input" placeholder="ルート名を入力...">
                        <button id="save-route-btn" class="batch-btn ok">ルートを保存</button>
                    </div>
                    <div class="search-box">
                        <input type="text" id="route-search" placeholder="ルートを検索...">
                    </div>
                    <div id="route-list" class="route-list">
                        <!-- ルートがここに動的に追加される -->
                        <div class="empty-msg">保存されたルートはありません</div>
                    </div>
                </div>

                <!-- バッチモードコントロール（右下オーバーレイ） -->
                <div id="batch-controls" class="batch-controls hidden">
                    <span class="batch-count">変更数: <span id="selected-count">0</span></span>
                    <button id="batch-cancel-btn" class="batch-btn cancel">キャンセル</button>
                    <button id="batch-ok-btn" class="batch-btn ok">変更を適用</button>
                </div>

                <div id="map"></div>
            </div>
            <footer class="site-footer">
                <p>当サイトは個人が運営する非公式ファンサイトであり、使用されているテキスト・画像等の著作権は Tripwire Interactive および関連する権利者に帰属します。</p>
                <p>掲載内容に問題がある場合は、お手数ですがご連絡ください。迅速に対応いたします。</p>
            </footer>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>

</html>
