<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装備詳細</title>
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="equipment.css">
</head>

<body>
    <aside class="sidebar">
        <a href="../index.html" class="logo">
            <span>Maneater Wiki</span>
        </a>
        <nav class="menu">
            <a href="../maneater.html" class="menu-item">
                <img src="../images/進化1.png" alt="装備">
                <span>装備</span>
            </a>
            <a href="../map/map.html" class="menu-item">
                <img src="../images/map1.png" alt="マップ">
                <span>マップ</span>
            </a>
            <a href="../history/history.html" class="menu-item">
                <span>更新履歴</span>
            </a>
        </nav>
    </aside>
    <main class="main">
        <div class="equipment-top">
            <div class="equipment-left">
                <img id="equipment-splash" src="" alt="装備画像">
            </div>
            <div class="equipment-right">
                <h1 id="detail-name"></h1>
                <p id="detail-slot"></p>
                <p id="detail-element"></p>
                <p id="detail-obtain"></p>
                <p id="detail-age"></p>
                <p id="detail-description"></p>
            </div>
        </div>

        <!-- 素材とティアを横並び -->
        <div class="section-material-tier">
            <div class="material-box-wrapper">
                <div class="material-container">
                    <h3>次のティアに必要</h3>
                    <div class="material-box">
                        <div class="mat-item" id="mat-protein">
                            <img src="../images/タンパク質.png" alt="タンパク質">
                            <span>×<span id="val-protein">0</span></span>
                        </div>
                        <div class="mat-item" id="mat-mineral">
                            <img src="../images/ミネラル.png" alt="ミネラル">
                            <span>×<span id="val-mineral">0</span></span>
                        </div>
                        <div class="mat-item" id="mat-fat">
                            <img src="../images/脂肪.png" alt="脂肪">
                            <span>×<span id="val-fat">0</span></span>
                        </div>
                        <div class="mat-item" id="mat-mutagen">
                            <img src="../images/突然変異源.png" alt="突然変異源">
                            <span>×<span id="val-mutagen">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="material-container">
                    <h3>Tier 1 からの合計</h3>
                    <div class="material-box">
                        <div class="mat-item" id="total-mat-protein">
                            <img src="../images/タンパク質.png" alt="タンパク質">
                            <span id="total-protein"></span>
                        </div>
                        <div class="mat-item" id="total-mat-mineral">
                            <img src="../images/ミネラル.png" alt="ミネラル">
                            <span id="total-mineral"></span>
                        </div>
                        <div class="mat-item" id="total-mat-fat">
                            <img src="../images/脂肪.png" alt="脂肪">
                            <span id="total-fat"></span>
                        </div>
                        <div class="mat-item" id="total-mat-mutagen">
                            <img src="../images/突然変異源.png" alt="突然変異源">
                            <span id="total-mutagen"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tier-box">
                <h2>ティア</h2>
                <input type="range" min="1" max="5" value="1" id="tier-slider">
                <span id="tier-label">Tier 1</span>
            </div>
        </div>

        <div class="section-effects">
            <section id="section-passive">
                <h2>パッシブ効果</h2>
                <p id="detail-passive"></p>
            </section>
            <section id="section-special">
                <h2>特殊能力</h2>
                <p id="detail-special"></p>
            </section>
        </div>
        <section id="section-ability">
            <h2>特殊アビリティ</h2>
            <p id="detail-ability-desc"></p>
            <p id="detail-ability-effect"></p>
        </section>

        <script src="equipment-data.js"></script>
        <script src="equipment-detail.js"></script>
    </main>



</body>






</html>
