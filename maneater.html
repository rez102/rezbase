<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://ddieubjzcwfrwsleyrkk.supabase.co wss://ddieubjzcwfrwsleyrkk.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>Maneater 装備一覧</title>
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="equipment/equipment.css">
</head>

<body data-site-root-prefix="." data-site-active-page="">
    <div class="layout">
        <div data-site-shell="sidebar"></div>
        <!--メインコンテンツ-->
        <main class="main">
            <button id="main-sidebar-open" class="main-sidebar-toggle" title="メニューを開く">≡</button>
            <button id="main-sidebar-close" class="main-sidebar-close" title="メニューを閉じる">‹</button>
            <button id="equipment-filter-toggle" class="filter-toggle-btn" title="フィルター">
                <img src="images/minisameicon.png" alt="フィルター">
            </button>
            <div id="filter-popover" class="filter-popover hidden">
                <div id="filters">
                    <!--フィルターや検索ボタンを入れる所-->
                    <button class="filter-btn" data-filter="atomic" data-filter-type="element">
                        <img src="images/アトミック.png" alt="アトミック">
                    </button>
                    <button class="filter-btn" data-filter="shadow" data-filter-type="element">
                        <img src="images/シャドウ.png" alt="シャドウ">
                    </button>
                    <button class="filter-btn" data-filter="bioelectric" data-filter-type="element">
                        <img src="images/バイオエレクトリック.png" alt="バイオエレクトリック">
                    </button>
                    <button class="filter-btn" data-filter="bone" data-filter-type="element">
                        <img src="images/ボーン.png" alt="ボーン">
                    </button>
                    <button class="filter-btn" data-filter="organ" data-filter-type="slot">
                        <img src="images/内蔵.png" alt="内蔵">
                    </button>
                    <button class="filter-btn" data-filter="jaw" data-filter-type="slot">
                        <img src="images/あご.png" alt="あご">
                    </button>
                    <button class="filter-btn" data-filter="fin" data-filter-type="slot">
                        <img src="images/ひれ.png" alt="ひれ">
                    </button>
                    <button class="filter-btn" data-filter="tail" data-filter-type="slot">
                        <img src="images/しっぽ.png" alt="しっぽ">
                    </button>
                    <button class="filter-btn" data-filter="body" data-filter-type="slot">
                        <img src="images/からだ.png" alt="からだ">
                    </button>
                    <button class="filter-btn" data-filter="head" data-filter-type="slot">
                        <img src="images/あたま.png" alt="あたま">
                    </button>
                </div>
            </div>
            <div id="equipment-container" class="grid">
                <!-- equipment-data.js から一覧カードを生成 -->
            </div>
            <div data-site-shell="footer"></div>
        </main>
    </div>
    <script src="shared/site-shell.js"></script>
    <script src="equipment/equipment-data.js"></script>
    <script src="equipment/equipment-list.js"></script>
</body>






</html>
