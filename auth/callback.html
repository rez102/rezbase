<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://ddieubjzcwfrwsleyrkk.supabase.co wss://ddieubjzcwfrwsleyrkk.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'">
    <title>認証を処理しています</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
            background: #08111d;
            color: #edf4ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(27, 92, 163, 0.35), transparent 42%),
                linear-gradient(180deg, #08111d 0%, #050913 100%);
        }

        .card {
            width: min(92vw, 420px);
            padding: 32px 28px;
            border: 1px solid rgba(151, 194, 255, 0.18);
            border-radius: 20px;
            background: rgba(9, 18, 31, 0.92);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
            text-align: center;
        }

        .spinner {
            width: 46px;
            height: 46px;
            margin: 0 auto 18px;
            border-radius: 50%;
            border: 4px solid rgba(139, 193, 255, 0.2);
            border-top-color: #7fc0ff;
            animation: spin 0.9s linear infinite;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: #c9d8ea;
            font-size: 0.95rem;
        }

        #callback-detail {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #9fb4cc;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <main class="card" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <h1 id="callback-status">認証を処理しています...</h1>
        <p id="callback-detail">このまましばらくお待ちください。</p>
        <noscript>
            <p style="margin-top: 14px; color: #ffd7d7;">JavaScript を有効にしてから再度お試しください。</p>
        </noscript>
    </main>

    <script src="../vendor/supabase/supabase.js"></script>
    <script src="../map/supabase-config.js"></script>
    <script src="callback-auth.js"></script>
</body>

</html>
